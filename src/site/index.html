<!DOCTYPE html>
<html>
    <style>
        body {
            height: 100vh;
            margin: 0;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
    </style>
    <head>
        <title>Loading...</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.2/rollups/aes.js"></script>
    </head>
    <body>
        <div id="body">
            <div class="content">
                <input type="password" id="password" placeholder="Password">
                <button onclick="switch_page('next', document.getElementById('password').value)">Continue...</button>
            </div>
        </div>
    </body>
    <script>
        const body = document.getElementById('body');
        async function switch_page(path, pwd) {
            var get_res = await fetch(`https://admin.jugg.school/${path}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    'pwd': pwd
                })
            });

            if(!get_res.ok) return;

            const data = await get_res.text();
            if(!data) return;

            body.innerHTML = data;
            window.stored_pwd = pwd;
        }

        function encrypt(text, pwd){
            return CryptoJS.AES.encrypt(text, pwd).toString();
        }

        async function login() {
            const ln = document.getElementById("login_name").value;
            const pwd = document.getElementById("password").value;
            const salt = document.getElementById("salt").value;

            var login_res = await fetch("https://api.jugg.school/admin/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    ln: ln,
                    pwd: pwd,
                    salt: salt
                })
            });

            if(!login_res.ok) return;

            const data = await login_res.json();
            if(!data) return;

            if(data["success"]) {
                switch_page("2fa", window.stored_pwd);
            }
        }

        async function get2FA() {
            var res_2fa = await fetch("https://api.jugg.school/admin/2fa", {
                credentials: "include"
            });

            if(!res_2fa.ok) return;
            const data = await res_2fa.json();
            if(!data) return;

            if(data["success"]) {
                document.getElementById('gpg').value = data["message"];
            }
        }

        async function login2FA(phrase) {
            var login_res = await fetch("https://api.jugg.school/admin/2fa/login", {
                method: "POST",
                credentials: 'include',
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    phrase: phrase
                })
            });

            if(!login_res.ok) return;

            const data = await login_res.json();
            if(!data) return;

            if(data["success"]) {
                window.location.pathname = '/panel';
                window.location.reload();
            }
        }
    </script>
</html>
