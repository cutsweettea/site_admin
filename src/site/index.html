<!DOCTYPE html>
<html>
    <style>
        .body {
            height: 100vh;
            margin: 0;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
    </style>
    <head>
        <title>Loading...</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.2/rollups/aes.js"></script>
    </head>
    <body id="body">
        <div class="content">
            <input type="text" id="password" placeholder="Password">
            <button onclick="switch_page('main', document.getElementById('password').value)">Continue...</button>
        </div>
    </body>
    <script>
        let cache = {};
        const body = document.getElementById('body');
        function decrypt(encryptedData, hashedPwd){
            let code;  
            code = CryptoJS.AES.decrypt(encryptedData, hashedPwd);
            let decryptedMessage = '';
            if (code.sigBytes < 0){
                return null;
            }
            decryptedMessage = code.toString(CryptoJS.enc.Utf8);
            return decryptedMessage;
        }

        async function switch_page(path, pwd) {
            var enc_data;
            if(Object.keys(cache).includes(path)) enc_data = cache[path];
            else enc_data = await fetch(`https://admin.jugg.school/${path}`);

            const data = decrypt(enc_data, pwd);
            if(data == null) return;
            body.innerHTML = data;
            window.pwd = pwd;
        }
    </script>
</html>
