<!DOCTYPE html>
<html>
    <style>
        .body {
            height: 100vh;
            margin: 0;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
    </style>
    <head>
        <title>Loading...</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.2/rollups/aes.js"></script>
    </head>
    <body id="body">
        <div class="content">
            <input type="text" id="password" placeholder="Password">
            <button onclick="switch_page('main', document.getElementById('password').value)">Continue...</button>
        </div>
    </body>
    <script>
        const body = document.getElementById('body');
        async function switch_page(path, pwd) {
            var data = await fetch(`https://admin.jugg.school/${path}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    'pwd': document.getElementById('password').value
                })
            });

            if(!data) return;
            body.innerHTML = data;
            window.pwd = pwd;
        }
    </script>
</html>
