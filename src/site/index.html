<!DOCTYPE html>
<html>
    <style>
        .body {
            height: 100vh;
            margin: 0;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
    </style>
    <head>
        <title>Loading...</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.2/rollups/aes.js"></script>
    </head>
    <body>
        <div id="body">
            <div class="content">
                <input type="password" id="password" placeholder="Password">
                <button onclick="switch_page('next', document.getElementById('password').value)">Continue...</button>
            </div>
        </div>
    </body>
    <script>
        const body = document.getElementById('body');
        async function switch_page(path, pwd) {
            var get_res = await fetch(`https://admin.jugg.school/${path}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    'pwd': document.getElementById('password').value
                })
            });

            if(!get_res.ok) return;

            const data = await get_res.text();
            if(!data) return;

            const js = data.split('<script>')[1].split('</scrip')[0].trim();
            console.log(js);

            const blob = new Blob([js], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const module = await import(url);
            console.log(module);

            console.log('eval js');
            body.innerHTML = data;
            window.pwd = pwd;
        }

        function encrypt(text, pwd){
            return CryptoJS.AES.encrypt(text, pwd).toString();
        }
    </script>
</html>
