<!DOCTYPE html>
<html>
    <style>
        body {
            height: 100vh;
            margin: 0;
        }

        .content {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .main-content {
            display: flex;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .content-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #000;
            border-radius: 5px;
            height: fit-content;
            width: fit-content;
            padding: 10px 20px;
            margin: 10px 20px;
        }

        .content-box-label {
            position: relative;
            background-color: #fff;
            bottom: 20px;
            padding: 0 8px;
            margin: 0;
        }

        input {
            margin: 5px 0;
        }

        button {
            margin: 5px 0;
            width: fit-content;
        }

        .gpg-text {
            margin: 5px 0;
            width: 350px;
            height: 100px;
        }
    </style>
    <head>
        <title>Admin Panel</title>
    </head>
    <body>
        <div class="content">
            <div class="header">
                <h1 id="header-text">[a]DMIN [p]ANEL</h1>
            </div>
            <div class="main-content">
                <div class="content-box">
                    <h3 class="content-box-label">CREATE ADMIN ACCOUNT</h3>
                    <input type="text" id="admin_ln" placeholder="Login name">
                    <input type="password" id="admin_pwd" placeholder="Password">
                    <input type="password" id="admin_salt" placeholder="Salt">
                    <input type="text" id="admin_uid" placeholder="Linked UID">
                    <textarea class="gpg-text" id="admin_gpg" placeholder="GPG public key"></textarea>
                    <button onclick="createAdminAccount()">Create</button>
                </div>
                <div class="content-box">
                    <h3 class="content-box-label">CREATE INVITE</h3>
                    <input type="text" id="invite_link" placeholder="Invite Link">
                    <button onclick="createInvite()">Generate Link</button>
                </div>
            </div>
        </div>
    </body>
    <script>
        async function createAdminAccount() {
            const ln = document.getElementById('admin_ln').value;
            const pwd = document.getElementById('admin_pwd').value;
            const salt = document.getElementById('admin_salt').value;
            const uid = document.getElementById('admin_uid').value;
            const gpg = document.getElementById('admin_gpg').value;

            const res = await fetch('https://api.jugg.school/admin/user/create', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                credentials: 'include',
                body: JSON.stringify({
                    uid: Number.parseInt(uid),
                    ln: ln,
                    pwd: pwd,
                    salt: salt,
                    gpg: gpg
                })
            });

            if(!res.ok) {
                alert('Failed creating account');
                return;
            }
            const data = await res.json();

            if(!data['success']) {
                alert('Failed creating account');
                return;
            }
            alert(data['message']);
        }

        async function createInvite() {
            const link = document.getElementById('invite_link').value;
            const res = await fetch('https://api.jugg.school/admin/invite', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                credentials: 'include',
                body: JSON.stringify({
                    link: link
                })
            });

            if(!res.ok) {
                alert('Failed creating invite');
                return;
            }
            const data = await res.json();

            if(!data['success']) {
                alert('Failed creating invite');
                return;
            }
            const generated_link = data['message'];
            console.log(generated_link);
        }
    </script>
</html>
